name: CI Build

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  PDFBOX_PARITY_GATE_MODE: ${{ vars.PDFBOX_PARITY_GATE_MODE || 'ratchet' }}
  PDFBOX_PARITY_PDFBOX_REF: ${{ vars.PDFBOX_PARITY_PDFBOX_REF || '2589dc979982b11e3ba92e107aed9f309362d517' }}
  PDFBOX_API_SURFACE_PDFBOX_REF: ${{ vars.PDFBOX_API_SURFACE_PDFBOX_REF || 'fc00e427de8a1046efe6348d64d5529b479aea13' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PdfBoxNet.slnx

      - name: Build
        run: dotnet build PdfBoxNet.slnx --configuration Release --no-restore

      - name: Install Playwright browsers
        run: >
          tests/PdfBox.Net.Html.Tests/bin/Release/net10.0/.playwright/node/linux-x64/node
          tests/PdfBox.Net.Html.Tests/bin/Release/net10.0/.playwright/package/cli.js
          install --with-deps chromium

      - name: Download Ghent test pages
        run: |
          tests/PdfBox.Net.Html.Tests/bin/Release/net10.0/.playwright/node/linux-x64/node \
            scripts/download-ghent-pdf.mjs \
            artifacts/external-pdf-samples/ghent \
            --test-pages \
            --playwright-package=tests/PdfBox.Net.Html.Tests/bin/Release/net10.0/.playwright/package

      - name: Test
        run: dotnet test PdfBoxNet.slnx --configuration Release --no-build --nologo

      - name: Conversion quality harness smoke
        run: |
          python3 -m py_compile tools/conversion_quality/run_conversion_quality.py
          python3 -m py_compile tools/conversion_quality/run_remote_corpus.py
          python3 -m unittest discover -s tests/conversion_quality -p 'test_*.py'
          python3 tools/conversion_quality/run_conversion_quality.py \
            --manifest tools/conversion_quality/smoke/manifest.json \
            --results-dir tools/conversion_quality/smoke/results \
            --out-dir artifacts/conversion-quality-smoke \
            --known-divergences tools/conversion_quality/smoke/known-divergences.json \
            --ratchet-baseline tools/conversion_quality/smoke/ratchet-baseline.json \
            --fail-on-unexpected \
            --fail-on-regression
          python3 tools/conversion_quality/run_remote_corpus.py \
            --id jmlr-lda \
            --id arxiv-adam \
            --id uscis-i9 \
            --id nps-mount-rainier \
            --base-review-manifest tools/conversion_quality/html-review-manifest.json \
            --cache-dir artifacts/cache/conversion-quality/remote-pdfs \
            --review-manifest-out artifacts/cache/conversion-quality/remote-html-review-manifest.json \
            --out-dir artifacts/conversion-quality-smoke/html-examples
          cat artifacts/conversion-quality-smoke/summary.md
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/conversion-quality-smoke/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload conversion quality artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: conversion-quality-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/conversion-quality-smoke
          if-no-files-found: warn

      - name: Checkout Apache PDFBox for API surface gate
        uses: actions/checkout@v7.0.0
        with:
          repository: apache/pdfbox
          ref: ${{ env.PDFBOX_API_SURFACE_PDFBOX_REF }}
          path: apache-pdfbox-api

      - name: API surface review gate
        run: >
          python3 tools/parity/generate_api_surface_report.py
          --upstream-root apache-pdfbox-api
          --no-build
          --ratchet-baseline reports/api-surface-ratchet-baseline.json
          --fail-on-unreviewed

      - name: Runtime parity harness smoke
        run: |
          python3 -m py_compile tools/parity/runtime/run_runtime_parity.py
          python3 tools/parity/runtime/run_runtime_parity.py --help

  runtime-parity:
    if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Checkout Apache PDFBox
        uses: actions/checkout@v7.0.0
        with:
          repository: apache/pdfbox
          ref: ${{ env.PDFBOX_PARITY_PDFBOX_REF }}
          path: apache-pdfbox

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Setup Java
        uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Apache PDFBox app jar
        working-directory: apache-pdfbox
        run: mvn -B -pl app -am -DskipTests package

      - name: Restore runtime probe
        run: dotnet restore tools/parity/runtime/DotnetPdfProbe/DotnetPdfProbe.csproj

      - name: Runtime parity suite
        run: >
          python3 tools/parity/runtime/run_runtime_parity.py
          --manifest tools/parity/runtime/corpus-manifest.txt
          --pdfbox-root apache-pdfbox
          --java-classpath apache-pdfbox/app/target/pdfbox-app-4.0.0-SNAPSHOT.jar
          --out-dir artifacts/runtime-parity
          --ratchet-baseline tools/parity/runtime/ratchet-baseline.json
          --gate-mode "${PDFBOX_PARITY_GATE_MODE:-ratchet}"
          --fail-on-unexpected

      - name: Runtime parity summary
        if: ${{ always() }}
        run: |
          if [ -f artifacts/runtime-parity/summary.md ]; then
            cat artifacts/runtime-parity/summary.md
            cat artifacts/runtime-parity/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Runtime parity summary was not generated."
          fi

      - name: Upload runtime parity artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: runtime-parity-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime-parity
