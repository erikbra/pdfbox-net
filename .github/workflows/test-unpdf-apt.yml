name: Test unpdf APT Repository

on:
  pull_request:
    paths:
      - ".github/workflows/test-unpdf-apt.yml"
      - "eng/build_unpdf_apt_repository.py"
      - "packaging/debian/**"
      - "tests/release/test_build_unpdf_apt_repository.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-repository:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install repository tools
        run: sudo apt-get update && sudo apt-get install -y apt-utils dpkg-dev gnupg

      - name: Generate ephemeral test signing key
        id: signing
        run: |
          cat > artifacts-gpg-key <<'EOF'
          %no-protection
          Key-Type: eddsa
          Key-Curve: Ed25519
          Key-Usage: sign
          Name-Real: unpdf CI repository
          Name-Email: unpdf-ci@example.invalid
          Expire-Date: 1d
          %commit
          EOF
          gpg --batch --generate-key artifacts-gpg-key
          fingerprint="$(gpg --batch --list-secret-keys --with-colons | awk -F: '$1 == "fpr" { print $10; exit }')"
          test -n "$fingerprint"
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"

      - name: Build signed test repository
        run: >-
          python3 eng/build_unpdf_apt_repository.py
          --manifest https://github.com/erikbra/pdfbox-net/releases/download/unpdf-v4.0.0-preview.1/release-manifest.json
          --output artifacts/apt-repository
          --suite preview
          --gpg-key "${{ steps.signing.outputs.fingerprint }}"

      - name: Verify repository signature and packages
        run: |
          gpgv --keyring artifacts/apt-repository/unpdf-archive-keyring.gpg \
            artifacts/apt-repository/dists/preview/InRelease
          dpkg-deb --info artifacts/apt-repository/pool/main/u/unpdf/*_amd64.deb
          dpkg-deb --info artifacts/apt-repository/pool/main/u/unpdf/*_arm64.deb

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: unpdf-apt-test-repository
          path: artifacts/apt-repository
          if-no-files-found: error

  install:
    needs: build-repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            architecture: amd64
          - os: ubuntu-24.04-arm
            architecture: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/download-artifact@v8.0.1
        with:
          name: unpdf-apt-test-repository
          path: artifacts/apt-repository

      - name: Serve signed repository
        run: |
          python3 -m http.server 8765 --directory artifacts/apt-repository >artifacts/apt-http.log 2>&1 &
          echo $! > artifacts/apt-http.pid
          sleep 1
          curl --fail http://127.0.0.1:8765/dists/preview/InRelease >/dev/null

      - name: Configure APT source
        run: |
          sudo install -m 0644 artifacts/apt-repository/unpdf-archive-keyring.gpg /usr/share/keyrings/unpdf-test.gpg
          echo "deb [arch=${{ matrix.architecture }} signed-by=/usr/share/keyrings/unpdf-test.gpg] http://127.0.0.1:8765 preview main" | \
            sudo tee /etc/apt/sources.list.d/unpdf-test.list
          sudo apt-get update

      - name: Install, convert, and reinstall
        run: |
          sudo apt-get install -y unpdf
          test "$(dpkg-query -W -f='${Architecture}' unpdf)" = "${{ matrix.architecture }}"
          dpkg-query -W -f='${Version}\n' unpdf | grep -Fx '4.0.0~preview.1'
          unpdf --version
          unpdf tests/PdfBox.Net.Tests/Fixtures/classic-xref-fixture.pdf \
            --output artifacts/apt-smoke --quiet
          grep -q Hello artifacts/apt-smoke/index.html
          test -f /usr/share/man/man1/unpdf.1.gz
          sudo apt-get install -y --only-upgrade unpdf
          sudo apt-get install -y --reinstall unpdf

      - name: Remove and verify cleanup
        run: |
          sudo apt-get purge -y unpdf
          if command -v unpdf; then
            echo "unpdf remained on PATH after apt removal" >&2
            exit 1
          fi
          test ! -e /usr/bin/unpdf
